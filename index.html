    <!-- html2canvas depuis CDN -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <!-- Script principal avec code splitting (dynamic import) -->
    <script type="module">
        // Fonction pour détecter les appareils mobiles
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   (window.matchMedia && window.matchMedia("(max-width: 768px)").matches) ||
                   ('ontouchstart' in window || navigator.maxTouchPoints > 0);
        }
        
        // Option 1: Dynamic import pour code splitting (recommandé)
        // Les modules sont chargés à la demande, réduisant le bundle initial
        (async () => {
            // Désactiver le shader sur mobile
            if (isMobileDevice()) {
                console.log('Shader désactivé sur mobile');
                // Afficher directement le contenu source sur mobile
                const sourceElement = document.querySelector('#source-element');
                const container = document.querySelector('#canvas-container');
                if (sourceElement && container) {
                    container.appendChild(sourceElement.cloneNode(true));
                    sourceElement.style.display = 'none';
                }
                return;
            }
            
            const { default: PaintReveal } = await import('./paint-reveal/index.js');
            
            const reveal = new PaintReveal({
                sourceElement: '#source-element',
                container: '#canvas-container',
                duration: 3000,
                autoStart: true
            });
        })();
        
        // Option 2: Import statique (comme avant)
        // import PaintReveal from './paint-reveal.js';
        // const reveal = new PaintReveal({ ... });
    </script>
